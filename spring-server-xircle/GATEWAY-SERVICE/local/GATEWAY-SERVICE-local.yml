eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/**
        - id: post-service
          uri: lb://POST-SERVICE
          predicates:
            - Path=/post-service/**
        - id: follow-service
          uri: lb://FOLLOW-SERVICE
          predicates:
            - Path=/follow-service/**
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive

jwt:
  secret: xircle
